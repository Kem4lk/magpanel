[platformio]
default_envs = esp32-s3-ota

; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi   ; PSRAM erisim modu
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
; board_build.partitions = partitions_custom_8mb.csv
build_flags = -DFM_APPLY_CIE=1  ; sRGB gamma duzeltmesi
	-DCONFIG_ASYNC_TCP_STACK_SIZE=8192
	-DFM_FLIP_Y_IN_HALF=1  ; diyagonal testiyle dogrulandi (v14)
	-DFM_CHAIN_REVERSE=1   ; panel-kimlik testiyle dogrulandi: kablo sirasi ters (mavi/yesil/kirmizi cikti)
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DBOARD_HAS_PSRAM                       ; 8MB PSRAM'i etkinlestir (RAM darligini cozer)
	-DCONFIG_SPIRAM_USE_MALLOC=1            ; malloc PSRAM'i de kullanabilsin
	-DCONFIG_ESP32S3_SPIRAM_SUPPORT=1

lib_deps =
	https://github.com/mrcodetastic/GFX_Lite
	ESP32Async/AsyncTCP @ ^3.3.2
	ESP32Async/ESPAsyncWebServer @ ^3.6.0

framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600
check_skip_packages = yes
; WiFi uzerinden yukleme: PlatformIO'da env olarak "esp32-s3-ota" sec.
; Ilk yukleme USB ile yapilmis olmali; sonrasi tamamen kablosuz.
[env:esp32-s3-ota]
extends = env:esp32-s3-devkitc-1
upload_protocol = espota
upload_port = 192.168.1.33      ; mDNS calismazsa paneldeki IP'yi yaz
upload_flags = --auth=magpanel    ; wifi_config.h'daki OTA_PASSWORD ile ayni
